name: moew_flutter
description: "Moew - Pet Care App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  ionicons: ^0.2.2
  cached_network_image: ^3.4.1

  # State management
  provider: ^6.1.5

  # Navigation
  go_router: ^14.8.1

  # HTTP & Networking
  http: ^1.3.0
  socket_io_client: ^3.0.2
  mqtt_client: ^10.0.0

  # Storage
  shared_preferences: ^2.5.3

  # Maps (Mapbox)
  mapbox_maps_flutter: ^2.20.0

  # Location
  geolocator: ^14.0.0

  # Camera & Media
  image_picker: ^1.1.2

  # Firebase
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  firebase_auth: ^5.1.0

  # Social Auth
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.2

  # Utils
  intl: ^0.20.2
  url_launcher: ^6.3.1
  google_fonts: ^8.0.2

  # Animation
  lottie: ^3.3.1
  flutter_local_notifications: ^21.0.0
  gal: ^2.3.2
  shimmer: ^3.0.0
  json_annotation: ^4.11.0
  flutter_svg: ^2.2.4
  camera: ^0.12.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  build_runner: ^2.13.1
  json_serializable: ^6.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
    - assets/room/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#9AE6C3" # Tùy ý, phù hợp với nền icon
  adaptive_icon_foreground: "assets/images/logo.png"
