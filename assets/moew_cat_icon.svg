<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Tai trái -->
  <polygon points="10,38 22,10 34,38" fill="#F5A05A"/>
  <!-- Tai phải -->
  <polygon points="66,38 78,10 90,38" fill="#F5A05A"/>
  <!-- Tai trong trái -->
  <polygon points="14,36 22,16 30,36" fill="#FBBF8A"/>
  <!-- Tai trong phải -->
  <polygon points="70,36 78,16 86,36" fill="#FBBF8A"/>

  <!-- Mặt -->
  <circle cx="50" cy="58" r="36" fill="#F5A05A"/>
  <!-- Vùng mõm trắng -->
  <ellipse cx="50" cy="68" rx="18" ry="14" fill="#FFF3E8"/>

  <!-- Mắt trái nhắm (happy) -->
  <path d="M32,52 Q36,46 40,52" stroke="#5C3D2E" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Mắt phải nhắm (happy) -->
  <path d="M60,52 Q64,46 68,52" stroke="#5C3D2E" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Mũi -->
  <ellipse cx="50" cy="63" rx="4" ry="2.5" fill="#E8826A"/>

  <!-- Miệng -->
  <path d="M46,66 Q50,71 54,66" stroke="#5C3D2E" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Râu trái -->
  <line x1="18" y1="63" x2="38" y2="65" stroke="#5C3D2E" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="18" y1="68" x2="38" y2="68" stroke="#5C3D2E" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Râu phải -->
  <line x1="62" y1="65" x2="82" y2="63" stroke="#5C3D2E" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="62" y1="68" x2="82" y2="68" stroke="#5C3D2E" stroke-width="1.2" stroke-linecap="round"/>
</svg>
